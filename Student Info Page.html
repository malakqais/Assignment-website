<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Info - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500&family=Open+Sans:wght@400;500&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-sage: #97B3AE;
            --color-mint: #D2E0D3;
            --color-cream: #F0DDD6;
            --color-peach: #F2C3B9;
            --color-beige: #D6CBBF;
            --color-white-smoke: #F0EEEA;
        }

        /* * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        } */

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #F0EEEA;
            display: flex;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
        }

     /* TOP BAR */
        .topbar {
            font-size: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #EDE7E3;
            padding: 15px 25px;
            border-radius: 10px;
        }

        /* INFO CARD */
        .info-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--color-mint);
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--color-white-smoke);
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: var(--color-peach);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
        }

        .profile-info h1 {
            font-size: 45px;
            color: var(--color-sage);
            margin-bottom: 5px;
        }

        .profile-info p {
            font-size: 28px;
            color: #888;
        }

        /* INFO GRID */
        .info-grid {
            display: flex;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .info-item {
            background: var(--color-white-smoke);
            padding: 25px;
            border-radius: 15px;
            transition: 0.3s;
            text-align: center;
        }

        .info-item:hover {
            transform: translateY(-8px);
            background: var(--color-mint);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .info-item label {
            display: block;
            color: var(--color-sage);
            font-weight: 600;
            font-size: 22px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item span {
            font-size: 32px;
            color: #333;
            font-weight: 600;
            display: block;
        }

        .btn-logout {
            color: #F0EEEA;
            font-size: 30px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #324c47;
            cursor: pointer;
            font-weight: bolder;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #97B3AE;
            transform: scale(1.05);
        }

        /* LOGO */
        .logo-img {
            width: 200px;
        }

        #dashboard { display: flex; }
    
        .sidebar {
            width: 250px;
            height: 160vh;
            background: #D2E0D3;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 150px;
            text-align: center;
        }

        .sidebar button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: #D6CBBF;
           font-size: 30px;
            font-weight: bolder;
            cursor: pointer;
            color:#324c47
        }

    
    </style>
</head>

<body>
    <!-- مكان Sidebar -->
<div class="sidebar">
        <h2>🎓</h2>

        <button onclick="location.href='MAIN1.html'">Dashboard</button>
        <button onclick="location.href='COURSE.html'">Courses</button>
        <!-- <button onclick="location.href='assignments.html'">Assignments</button> -->
        <button onclick="location.href='Student Info Page.html'">Student Info</button>
        <button onclick="location.href='log out.html'">Logout</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main" id="dashboard">
    <div class="topbar">
            <h3 id="welcomeText">Welcome!👋🏻</h3>
            <img src="LOGO_TR.png" width="200">
        </div>

        <!-- INFO CONTENT -->
        <div class="info-card">
            <div class="profile-header">
                <div class="avatar" id="userAvatar">A</div>
                <div class="profile-info">
                    <h1 id="welcomeTitle">Student Profile</h1>
                    <p>Manage your academic information</p>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <label>Full Name</label>
                    <span id="displayName">---</span>
                </div>
                <div class="info-item">
                    <label>Email Address</label>
                    <span id="displayEmail">---</span>
                </div>
                <div class="info-item">
                    <label>Major</label>
                    <span id="displayMajor">---</span>
                </div>
                <div class="info-item">
                    <label>Nationality</label>
                    <span id="displayNation">---</span>
                </div>
                <div class="info-item">
                    <label>Date of Birth</label>
                    <span id="displayDob">---</span>
                </div>
            </div>

            <!-- LOGOUT BUTTON -->
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn-logout" onclick="logout()">Logout 🚪</button>
            </div>
        </div>
    </div>

    <script>
        // تحميل الـ sidebar من ملف خارجي
        fetch('sidebar.html')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.text();
            })
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
            })
            .catch(error => {
                console.error('Error loading sidebar:', error);
                document.getElementById('sidebar-container').innerHTML = '<div style="padding:20px;color:red;">Failed to load sidebar.</div>';
            });

        window.onload = function() {
            const savedStudent = localStorage.getItem('student');
            
            if (savedStudent) {
                const student = JSON.parse(savedStudent);
                
                // عرض البيانات الأساسية
                document.getElementById('displayName').textContent = student.name;
                document.getElementById('displayEmail').textContent = student.email;
                document.getElementById('displayMajor').textContent = student.major;
                document.getElementById('displayNation').textContent = student.nationality;
                document.getElementById('displayDob').textContent = student.dob;
                
                // تحديث الأفاتار (الحرف الأول)
                const firstLetter = student.name ? student.name.charAt(0).toUpperCase() : 'A';
                document.getElementById('userAvatar').textContent = firstLetter;
                
                // استخراج الاسم الأول (معالجة آمنة)
                let firstName = 'Student';
                if (student.name) {
                    const nameParts = student.name.trim().split(' ');
                    firstName = nameParts[0] || 'Student';
                }
                
                // تحديث رسائل الترحيب
                document.getElementById('welcomeTitle').textContent = `Welcome, ${firstName}!`;
                document.getElementById('welcomeText').textContent = `Welcome, ${firstName}! 👋🏻`;
                
                // إظهار المحتوى
                document.getElementById('dashboard').style.display = 'block';
            } else {
                window.location.href = "log in.html";
            }
        };

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                window.location.href = "log out.html";
            }
        }
    </script>
</body>
</html>
