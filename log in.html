<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E learning system</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --color-sage: #97B3AE; --color-dark: #324c47; }
        body { font-family: 'Roboto', sans-serif; background: #F0EEEA; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border-top: 8px solid var(--color-sage); }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 2rem; color: var(--color-dark); text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn-primary { background: var(--color-sage); color: white; }
        .auth-link { text-align: center; color: var(--color-sage); display: block; margin-top: 15px; cursor: pointer; font-weight: 600; text-decoration: none; }
        .page-toggle { display: none; }
        .page-toggle.active { display: block; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">🎓 E-learning System</div>
        
        <div id="loginPage" class="page-toggle active">
            <h2>Sign In</h2>
            <form id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="l-email" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="l-pass" required></div>
                <button type="submit" class="btn btn-primary">Login</button>
                <a class="auth-link" onclick="toggleAuth('signupPage')">Create account</a>
            </form>
        </div>

        <div id="signupPage" class="page-toggle">
            <h2>Register</h2>
            <form id="signupForm">
                <div class="form-group"><label>Full Name</label><input type="text" id="s-name" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="s-email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"></div>
                <div class="form-group"><label>Password</label><input type="password" id="s-pass" required minlength="6" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[\$_]).+"></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="s-confirm" required></div>
                <div class="form-group"><label>Date of Birth</label><input type="date" id="s-dob" required></div>
                <div class="form-group"><label>Major</label><input type="text" id="s-major" required></div>
                <div class="form-group"><label>Nationality</label><input type="text" id="s-nat" required></div>
                <button type="submit" class="btn btn-primary">Register</button>
                <a class="auth-link" onclick="toggleAuth('loginPage')">Back to Login</a>
            </form>
        </div>
    </div>

    <script>
        const USERS_KEY = 'STUDENTHUB_USERS_LIST';
        const SESSION_KEY = 'student';

        function toggleAuth(id) {
            document.querySelectorAll('.page-toggle').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('signupForm').onsubmit = function(e) {
            e.preventDefault();
            if(document.getElementById('s-pass').value !== document.getElementById('s-confirm').value) return alert("Passwords match error!");
            const user = { 
                name: document.getElementById('s-name').value, 
                email: document.getElementById('s-email').value.toLowerCase(), 
                password: document.getElementById('s-pass').value,
                dob: document.getElementById('s-dob').value,
                major: document.getElementById('s-major').value,
                nationality: document.getElementById('s-nat').value
            };
            let users = JSON.parse(localStorage.getItem(USERS_KEY) || "[]");
            if(users.some(u => u.email === user.email)) return alert("Email exists!");
            users.push(user);
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            alert("Account Created! Please Login."); 
            toggleAuth('loginPage');
        };

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const users = JSON.parse(localStorage.getItem(USERS_KEY) || "[]");
            const foundUser = users.find(u => u.email === document.getElementById('l-email').value.toLowerCase() && u.password === document.getElementById('l-pass').value);
            if(foundUser) {
                localStorage.setItem(SESSION_KEY, JSON.stringify(foundUser));
                window.location.href = 'MAIN1.html';
            } else alert("Invalid credentials!");
        };
    </script>
</body>
</html>
